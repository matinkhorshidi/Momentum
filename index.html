<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><title>Momentum Favicon</title><rect fill='%23bb86fc' x='15' y='55' width='20' height='35' rx='4'/><rect fill='%23bb86fc' x='40' y='35' width='20' height='55' rx='4'/><rect fill='%23bb86fc' x='65' y='15' width='20' height='75' rx='4'/></svg>"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Login Screen -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-header">
          <svg
            width="40"
            height="40"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <title>Momentum Logo</title>
            <rect
              style="fill: #bb86fc"
              x="15"
              y="55"
              width="20"
              height="35"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="40"
              y="35"
              width="20"
              height="55"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="65"
              y="15"
              width="20"
              height="75"
              rx="4"
            ></rect>
          </svg>
          <h1 class="logo">Momentum</h1>
        </div>
        <p>Log in or create an account to start.</p>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" required />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <button type="submit">Continue</button>
        </form>
        <p id="login-error" class="error-message"></p>
      </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" style="display: none">
      <header>
        <div class="app-header-title">
          <svg
            width="40"
            height="40"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <title>Momentum Logo</title>
            <rect
              style="fill: #bb86fc"
              x="15"
              y="55"
              width="20"
              height="35"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="40"
              y="35"
              width="20"
              height="55"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="65"
              y="15"
              width="20"
              height="75"
              rx="4"
            ></rect>
          </svg>
          <h1 class="logo">Momentum</h1>
        </div>
        <button id="logout-button">Lock</button>
      </header>

      <main>
        <section id="stats-overview">
          <h2>Total Momentum</h2>
          <div id="total-units" class="stat-number">0</div>
          <p>units logged since you began.</p>
          <div id="data-management">
            <button id="export-button" class="data-btn">Export Data</button>
            <label for="import-file" class="data-btn">Import Data</label>
            <input
              type="file"
              id="import-file"
              accept=".json"
              style="display: none"
            />
          </div>
        </section>

        <section id="daily-tracker">
          <h2>Today's Log: <span id="current-date"></span></h2>
          <p>Click a button below to add a 45-minute block.</p>
          <div id="add-unit-controls">
            <!-- Buttons will be dynamically generated by JS -->
          </div>
          <div id="today-log">
            <!-- Today's units will be dynamically added here -->
          </div>
        </section>

        <section id="category-manager">
          <h2>Manage Categories</h2>
          <div id="category-list">
            <!-- Categories will be dynamically loaded here -->
          </div>
          <form id="add-category-form">
            <input
              type="text"
              id="new-category-label"
              placeholder="Add a new category..."
              required
            />
            <input type="color" id="new-category-color" value="#3498db" />
            <button type="submit">Add</button>
          </form>
        </section>

        <section id="history">
          <h2>History</h2>
          <div id="history-log">
            <!-- Previous days' logs will be shown here -->
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
