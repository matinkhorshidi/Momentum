<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* General Setup */
      :root {
        --bg-color: #121212;
        --surface-color: #1e1e1e;
        --primary-text: #e0e0e0;
        --secondary-text: #a0a0a0;
        --accent-color: #bb86fc;
        --error-color: #ff002f;
        --font-family: 'Inter', sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-family);
        background-color: var(--bg-color);
        color: var(--primary-text);
        line-height: 1.6;
      }

      button {
        font-family: var(--font-family);
      }

      /* Login Screen */
      #login-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }

      .login-box {
        background-color: var(--surface-color);
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 90%;
        max-width: 380px;
      }

      .login-header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .login-header .logo {
        font-size: 2rem;
      }

      .login-box p {
        color: var(--secondary-text);
      }

      #login-form {
        margin-top: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      #login-form input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #333;
        border-radius: 6px;
        background-color: #2c2c2c;
        color: var(--primary-text);
        font-size: 1rem;
      }

      #login-form button {
        width: 100%;
        padding: 0.8rem;
        border: none;
        border-radius: 6px;
        background-color: var(--accent-color);
        color: #121212;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      #login-form button:hover {
        background-color: #a36ef4;
      }

      .error-message {
        color: var(--error-color);
        font-size: 0.9rem;
        margin-top: 0.5rem;
        height: 1rem;
      }

      /* Main App Layout */
      #app-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3rem;
      }

      .app-header-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .logo {
        color: var(--accent-color);
        font-weight: 700;
      }

      #logout-button {
        background: none;
        border: 1px solid #333;
        color: var(--secondary-text);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      #logout-button:hover {
        background-color: #2c2c2c;
      }

      section {
        background-color: var(--surface-color);
        padding: 1.5rem 2rem;
        border-radius: 12px;
        margin-bottom: 2rem;
      }

      h2 {
        margin-bottom: 1rem;
        border-bottom: 1px solid #333;
        padding-bottom: 0.5rem;
        color: var(--primary-text);
      }

      /* Stats Overview & Data Management */
      #stats-overview {
        text-align: center;
      }

      .stat-number {
        font-size: 4rem;
        font-weight: 700;
        color: var(--accent-color);
        line-height: 1;
      }

      #stats-overview p {
        color: var(--secondary-text);
      }

      #data-management {
        margin-top: 1.5rem;
        display: flex;
        justify-content: center;
        gap: 1rem;
        border-top: 1px solid #2c2c2c;
        padding-top: 1.5rem;
      }

      .data-btn {
        background: none;
        border: 1px solid #444;
        color: var(--secondary-text);
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s ease;
      }

      .data-btn:hover {
        background-color: #2c2c2c;
        color: var(--primary-text);
      }

      /* Inline Category Management */
      .category-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        border-radius: 6px;
        transition: background-color 0.2s;
      }
      .category-item:hover {
        background-color: #2a2a2a;
      }
      .category-item input[type='color'] {
        min-width: 40px;
        height: 38px;
        border: 1px solid #444;
        padding: 2px;
        border-radius: 4px;
        cursor: pointer;
        background: none;
      }
      .category-item input[type='text'] {
        flex-grow: 1;
        padding: 0.6rem;
        background-color: #2c2c2c;
        border: 1px solid #444;
        border-radius: 4px;
        color: var(--primary-text);
        font-size: 1rem;
      }
      .delete-cat-btn {
        background: none;
        border: none;
        color: var(--secondary-text);
        font-size: 1.2rem;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s, color 0.2s;
      }
      .category-item:hover .delete-cat-btn {
        opacity: 1;
      }
      .delete-cat-btn:hover {
        color: var(--error-color);
      }

      #add-category-form {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px dashed #333;
        transition: border-color 0.2s;
      }
      #add-category-form:focus-within {
        border-color: var(--accent-color);
      }
      #add-category-form input[type='text'] {
        flex-grow: 1;
        background-color: transparent;
        border: none;
        color: var(--primary-text);
        font-size: 1rem;
        outline: none;
      }
      #add-category-form input[type='color'] {
        border: none;
        background: none;
        width: 28px;
        height: 28px;
        cursor: pointer;
      }
      #add-category-form button {
        padding: 0.5rem 1rem;
        background-color: var(--accent-color);
        border: none;
        color: #121212;
        cursor: pointer;
        font-weight: 500;
        border-radius: 6px;
        transition: background-color 0.2s;
      }
      #add-category-form button:hover {
        background-color: #a36ef4;
      }

      /* Daily Tracker */
      #add-unit-controls {
        display: flex; /* Changed from grid */
        flex-wrap: wrap; /* Allows buttons to wrap to the next line */
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .control-button {
        border: none;
        padding: 0.8rem 1.2rem; /* Give some horizontal padding */
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.2s;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        flex-grow: 0; /* Do not grow to fill space */
        flex-shrink: 0; /* Do not shrink */
      }
      .control-button:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }

      #today-log {
        margin-top: 1.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        min-height: 40px;
      }

      .unit-block {
        width: 38px;
        height: 38px;
        border-radius: 6px;
        animation: pop-in 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        position: relative; /* For positioning children */
        overflow: hidden; /* To contain children during transition */
      }
      .unit-block:hover {
        transform: scale(1.1);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      .unit-block .initial-letter {
        font-size: 1.1rem;
        transition: opacity 0.15s ease-out;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4);
      }

      .unit-block .delete-icon {
        position: absolute;
        font-size: 1.8rem;
        line-height: 1;
        color: var(--error-color);
        opacity: 0;
        transition: opacity 0.15s ease-in;
        pointer-events: none; /* Make sure the underlying div gets the click */
      }

      .unit-block:hover .initial-letter {
        opacity: 0;
      }

      .unit-block:hover .delete-icon {
        opacity: 1;
      }

      @keyframes pop-in {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* History */
      .history-entry {
        display: flex;
        justify-content: space-between;
        padding: 1rem 0;
        border-bottom: 1px solid #2c2c2c;
      }
      .history-entry:last-child {
        border-bottom: none;
      }
      .history-date {
        font-weight: 500;
      }
      .history-total {
        color: var(--secondary-text);
      }
    </style>
  </head>
  <body>
    <!-- Login Screen -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-header">
          <svg
            width="40"
            height="40"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <title>Momentum Logo</title>
            <rect
              style="fill: #bb86fc"
              x="15"
              y="55"
              width="20"
              height="35"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="40"
              y="35"
              width="20"
              height="55"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="65"
              y="15"
              width="20"
              height="75"
              rx="4"
            ></rect>
          </svg>
          <h1 class="logo">Momentum</h1>
        </div>
        <p>Log in or create an account to start.</p>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" required />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <button type="submit">Continue</button>
        </form>
        <p id="login-error" class="error-message"></p>
      </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" style="display: none">
      <header>
        <div class="app-header-title">
          <svg
            width="40"
            height="40"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <title>Momentum Logo</title>
            <rect
              style="fill: #bb86fc"
              x="15"
              y="55"
              width="20"
              height="35"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="40"
              y="35"
              width="20"
              height="55"
              rx="4"
            ></rect>
            <rect
              style="fill: #bb86fc"
              x="65"
              y="15"
              width="20"
              height="75"
              rx="4"
            ></rect>
          </svg>
          <h1 class="logo">Momentum</h1>
        </div>
        <button id="logout-button">Lock</button>
      </header>

      <main>
        <section id="stats-overview">
          <h2>Total Momentum</h2>
          <div id="total-units" class="stat-number">0</div>
          <p>units logged since you began.</p>
          <div id="data-management">
            <button id="export-button" class="data-btn">Export Data</button>
            <label for="import-file" class="data-btn">Import Data</label>
            <input
              type="file"
              id="import-file"
              accept=".json"
              style="display: none"
            />
          </div>
        </section>

        <section id="daily-tracker">
          <h2>Today's Log: <span id="current-date"></span></h2>
          <p>Click a button below to add a 45-minute block.</p>
          <div id="add-unit-controls">
            <!-- Buttons will be dynamically generated by JS -->
          </div>
          <div id="today-log">
            <!-- Today's units will be dynamically added here -->
          </div>
        </section>

        <section id="category-manager">
          <h2>Manage Categories</h2>
          <div id="category-list">
            <!-- Categories will be dynamically loaded here -->
          </div>
          <form id="add-category-form">
            <input
              type="text"
              id="new-category-label"
              placeholder="Add a new category..."
              required
            />
            <input type="color" id="new-category-color" value="#3498db" />
            <button type="submit">Add</button>
          </form>
        </section>

        <section id="history">
          <h2>History</h2>
          <div id="history-log">
            <!-- Previous days' logs will be shown here -->
          </div>
        </section>
      </main>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // --- AUTHENTICATION & DATA MODEL ---
        const DEFAULT_USER_DATA = {
          settings: {
            categories: {
              work: { label: 'Work (Smartory)', color: '#4a90e2' },
              study: { label: 'University', color: '#50e3c2' },
              'side-project': { label: 'Side Project', color: '#f5a623' },
            },
          },
          log: {},
        };

        // --- DOM ELEMENTS ---
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const loginForm = document.getElementById('login-form');
        const logoutButton = document.getElementById('logout-button');
        const exportButton = document.getElementById('export-button');
        const importFile = document.getElementById('import-file');
        const categoryListContainer = document.getElementById('category-list');
        const addCategoryForm = document.getElementById('add-category-form');

        // --- STATE MANAGEMENT ---
        let currentUserEmail = null;
        let allUsersData = {};
        let currentUserData = {}; // A reference to the current user's data object

        // --- UTILITY FUNCTIONS ---
        const getTodayDateString = () => new Date().toISOString().slice(0, 10);

        const getTextColorForBg = (hexColor) => {
          if (!hexColor || hexColor.length < 7) return '#FFFFFF'; // Default to white for invalid colors
          const r = parseInt(hexColor.substr(1, 2), 16);
          const g = parseInt(hexColor.substr(3, 2), 16);
          const b = parseInt(hexColor.substr(5, 2), 16);
          const yiq = (r * 299 + g * 587 + b * 114) / 1000;
          return yiq >= 128 ? '#000000' : '#FFFFFF';
        };

        const loadAllUsersData = () => {
          const savedData = localStorage.getItem('momentumUsers');
          allUsersData = savedData ? JSON.parse(savedData) : {};
        };

        const saveAllUsersData = () => {
          localStorage.setItem('momentumUsers', JSON.stringify(allUsersData));
        };

        const loadCurrentUser = () => {
          currentUserEmail = sessionStorage.getItem('momentumCurrentUser');
          if (currentUserEmail && allUsersData[currentUserEmail]) {
            currentUserData = allUsersData[currentUserEmail];
            return true;
          }
          return false;
        };

        // --- RENDER FUNCTIONS ---
        const renderAll = () => {
          if (!currentUserData) return;
          renderTotalStats();
          renderCategories();
          renderUnitControls();
          renderDailyLog();
          renderHistory();
        };

        const renderTotalStats = () => {
          const totalUnits = Object.values(currentUserData.log || {}).reduce(
            (total, dailyData) => {
              return (
                total +
                Object.values(dailyData).reduce((sum, count) => sum + count, 0)
              );
            },
            0
          );
          document.getElementById('total-units').textContent = totalUnits;
        };

        const renderCategories = () => {
          categoryListContainer.innerHTML = '';
          for (const [key, cat] of Object.entries(
            currentUserData.settings.categories
          )) {
            const item = document.createElement('div');
            item.className = 'category-item';
            item.innerHTML = `
                    <input type="color" value="${cat.color}" data-key="${key}">
                    <input type="text" value="${cat.label}" data-key="${key}">
                    <button class="delete-cat-btn" data-key="${key}">🗑️</button>
                `;
            categoryListContainer.appendChild(item);
          }
        };

        const renderUnitControls = () => {
          const controlsContainer =
            document.getElementById('add-unit-controls');
          controlsContainer.innerHTML = '';
          for (const [key, value] of Object.entries(
            currentUserData.settings.categories
          )) {
            const button = document.createElement('button');
            button.className = 'control-button';
            button.style.backgroundColor = value.color;
            button.style.color = getTextColorForBg(value.color);
            button.textContent = `+ ${value.label}`;
            button.onclick = () => addUnit(key);
            controlsContainer.appendChild(button);
          }
        };

        const renderDailyLog = () => {
          const todayStr = getTodayDateString();
          document.getElementById('current-date').textContent =
            new Date().toLocaleDateString('en-US', {
              weekday: 'long',
              month: 'long',
              day: 'numeric',
            });
          const todayLogContainer = document.getElementById('today-log');
          todayLogContainer.innerHTML = '';

          if (currentUserData.log && currentUserData.log[todayStr]) {
            for (const [categoryKey, count] of Object.entries(
              currentUserData.log[todayStr]
            )) {
              const categoryInfo =
                currentUserData.settings.categories[categoryKey];
              if (!categoryInfo) continue;

              for (let i = 0; i < count; i++) {
                const unitBlock = document.createElement('div');
                unitBlock.className = 'unit-block';
                unitBlock.style.backgroundColor = categoryInfo.color;
                unitBlock.title = `Click to remove one unit of "${categoryInfo.label}"`;

                unitBlock.innerHTML = `
                            <span class="initial-letter" style="color: ${getTextColorForBg(
                              categoryInfo.color
                            )};">${categoryInfo.label
                  .charAt(0)
                  .toUpperCase()}</span>
                            <span class="delete-icon">&times;</span>
                        `;

                unitBlock.onclick = () => removeUnit(categoryKey);
                todayLogContainer.appendChild(unitBlock);
              }
            }
          }
        };

        const renderHistory = () => {
          const historyLogContainer = document.getElementById('history-log');
          historyLogContainer.innerHTML = '';
          const todayStr = getTodayDateString();
          const sortedDates = Object.keys(currentUserData.log || {})
            .sort()
            .reverse();

          for (const date of sortedDates) {
            if (date === todayStr) continue;
            const dailyTotal = Object.values(currentUserData.log[date]).reduce(
              (sum, count) => sum + count,
              0
            );
            if (dailyTotal === 0) continue;

            const historyEntry = document.createElement('div');
            historyEntry.className = 'history-entry';
            historyEntry.innerHTML = `<span class="history-date">${date}</span><span class="history-total">${dailyTotal} units</span>`;
            historyLogContainer.appendChild(historyEntry);
          }
        };

        // --- ACTION FUNCTIONS ---
        const addUnit = (categoryKey) => {
          const todayStr = getTodayDateString();
          if (!currentUserData.log[todayStr])
            currentUserData.log[todayStr] = {};
          currentUserData.log[todayStr][categoryKey] =
            (currentUserData.log[todayStr][categoryKey] || 0) + 1;
          saveAllUsersData();
          renderAll();
        };

        const removeUnit = (categoryKey) => {
          const todayStr = getTodayDateString();
          if (
            currentUserData.log[todayStr] &&
            currentUserData.log[todayStr][categoryKey]
          ) {
            currentUserData.log[todayStr][categoryKey]--;
            if (currentUserData.log[todayStr][categoryKey] <= 0) {
              delete currentUserData.log[todayStr][categoryKey];
            }
            saveAllUsersData();
            renderAll();
          }
        };

        // --- EVENT HANDLERS ---
        addCategoryForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const newLabelInput = document.getElementById('new-category-label');
          const newColorInput = document.getElementById('new-category-color');
          const newLabel = newLabelInput.value.trim();
          if (newLabel) {
            const newKey = `custom_${Date.now()}`;
            currentUserData.settings.categories[newKey] = {
              label: newLabel,
              color: newColorInput.value,
            };
            newLabelInput.value = '';
            saveAllUsersData();
            renderAll();
          }
        });

        categoryListContainer.addEventListener('change', (e) => {
          if (e.target.matches('input')) {
            const key = e.target.dataset.key;
            const property = e.target.type === 'text' ? 'label' : 'color';
            currentUserData.settings.categories[key][property] = e.target.value;
            saveAllUsersData();
            renderAll();
          }
        });

        categoryListContainer.addEventListener('click', (e) => {
          if (e.target.matches('.delete-cat-btn')) {
            const key = e.target.dataset.key;
            const categoryLabel =
              currentUserData.settings.categories[key]?.label;
            if (
              confirm(
                `Are you sure you want to delete the category "${categoryLabel}"? This cannot be undone.`
              )
            ) {
              delete currentUserData.settings.categories[key];
              saveAllUsersData();
              renderAll();
            }
          }
        });

        const handleExport = () => {
          if (Object.keys(currentUserData.log).length === 0) {
            alert('No data to export.');
            return;
          }
          const dataStr = JSON.stringify(currentUserData, null, 2);
          const blob = new Blob([dataStr], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `momentum-backup-${currentUserEmail}-${getTodayDateString()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const handleImport = (event) => {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const importedData = JSON.parse(e.target.result);
              if (
                confirm(
                  'Are you sure you want to overwrite your current data with the imported file?'
                )
              ) {
                allUsersData[currentUserEmail] = importedData;
                currentUserData = importedData;
                saveAllUsersData();
                renderAll();
                alert('Data imported successfully!');
              }
            } catch (error) {
              alert('Invalid file format.');
            }
          };
          reader.readAsText(file);
          event.target.value = null;
        };

        // --- APP INITIALIZATION & LOGIN ---
        const initApp = () => {
          loginScreen.style.display = 'none';
          appContainer.style.display = 'block';
          renderAll();
        };

        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value.toLowerCase();
          const password = document.getElementById('password').value;
          const errorEl = document.getElementById('login-error');

          // Login
          if (allUsersData[email]) {
            if (allUsersData[email].password === password) {
              sessionStorage.setItem('momentumCurrentUser', email);
              currentUserData = allUsersData[email];
              initApp();
            } else {
              errorEl.textContent = 'Incorrect password.';
            }
          }
          // Sign Up
          else {
            allUsersData[email] = {
              password: password,
              ...JSON.parse(JSON.stringify(DEFAULT_USER_DATA)), // Deep copy
            };
            sessionStorage.setItem('momentumCurrentUser', email);
            currentUserData = allUsersData[email];
            saveAllUsersData();
            initApp();
          }
        });

        logoutButton.addEventListener('click', () => {
          sessionStorage.removeItem('momentumCurrentUser');
          location.reload();
        });

        exportButton.addEventListener('click', handleExport);
        importFile.addEventListener('change', handleImport);

        // --- Initial Load ---
        loadAllUsersData();
        if (loadCurrentUser()) {
          initApp();
        } else {
          loginScreen.style.display = 'flex';
        }
      });
    </script>
  </body>
